spring.application.name=sprint-app

# JSP view resolver
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:5432/sprint_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

server.port=8081

# URL de l'application Vue utilisee dans les QR codes
app.frontend.base-url=http://localhost:3000

# Limites d'upload pour les scans (augmenter si besoin)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Tomcat connector limits (increase to allow larger POST uploads)
# Set to 0 for no limit, or give a byte size (e.g., 20971520 = 20MB)
server.tomcat.max-http-post-size=20971520
server.tomcat.max-swallow-size=20971520
